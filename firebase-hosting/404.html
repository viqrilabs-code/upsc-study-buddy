<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TamGam</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        background: #f8f2e6;
        color: #1b1714;
      }

      main {
        text-align: center;
        padding: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
      }

      p {
        margin: 0;
        font-size: 1rem;
        color: #5d5349;
      }

      .accent {
        color: #c86b2a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1><span>Tam</span><span class="accent">Gam</span></h1>
      <p>The workspace is warming up. Please retry in a moment.</p>
    </main>
  </body>
</html>
